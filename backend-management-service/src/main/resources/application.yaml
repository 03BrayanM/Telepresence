spring:
  application:
    name: management-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tourpresence
    driver-class-name: org.postgresql.Driver
    username: synexis
    password: synexis123

  sql:
    init:
      mode: never

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/synexis

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    time_zone: UTC
    serialization:
      write-empty-json-arrays: true

server:
  port: 8080

keycloak:
  realm: synexis
  